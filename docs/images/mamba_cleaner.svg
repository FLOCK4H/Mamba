<svg xmlns="http://www.w3.org/2000/svg" width="1074" height="694" viewBox="0 0 1074 694">
  <title>Mamba Cleaner</title>
  <rect x="0" y="0" width="1074" height="694" rx="12" fill="#0b1220"/>
  <text x="16" y="30" font-size="14" fill="#e2e8f0" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, \"Liberation Mono\", \"Courier New\", monospace" xml:space="preserve">
    <tspan x="16" dy="0">Wallet cleaner previews close-empty accounts, unwraps WSOL, and can optionally burn non-zero balances before closing.   </tspan>
    <tspan x="16" dy="18">main: main (QWmr...UzwF)  active: 2  balance: 12.3456 SOL  network=mainnet  selected_wallets=2  matching_accounts=3  ...</tspan>
    <tspan x="16" dy="18">API base http://127.0.0.1:8787/mamba-api/v1  RPC https://mainnet.helius-rpc.com/?&lt;redacted&gt;                             </tspan>
    <tspan x="16" dy="18">Keyboard: ↑/↓ wallets or cycle fields, ←/→ toggle values, r refresh, Enter runs BUILD/SEND, Esc back.                   </tspan>
    <tspan x="16" dy="18">                                                                                                                        </tspan>
    <tspan x="16" dy="18">                                                                                                                        </tspan>
    <tspan x="16" dy="18">────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────</tspan>
    <tspan x="16" dy="18"> Wallet previews ───────────────────────────────── Controls ────────────────────────────────────────────────────────────</tspan>
    <tspan x="16" dy="18"> [MA] QWmr...UzwF    main  m=3 reclaim=0.0061        [DEVNET] [MAINNET]                                                 </tspan>
    <tspan x="16" dy="18"> [-A] gBxS...ULE5    wallet-01  no preview           burn_nonzero: on                                                   </tspan>
    <tspan x="16" dy="18"> [--] k7Fa...DfYn    wallet-02  preview error        close_empty: on                                                    </tspan>
    <tspan x="16" dy="18">                                                     unwrap_wsol: on                                                    </tspan>
    <tspan x="16" dy="18">                                                   ▸ [BUILD] [SEND]                                                     </tspan>
    <tspan x="16" dy="18">                                                   Press r to refresh previews after changing active wallets or after a </tspan>
    <tspan x="16" dy="18">                                                   cleanup run.                                                         </tspan>
    <tspan x="16" dy="18">                                                                                                                        </tspan>
    <tspan x="16" dy="18">                                                                                                                        </tspan>
    <tspan x="16" dy="18">                                                  ──────────────────────────────────────────────────────────────────────</tspan>
    <tspan x="16" dy="18">                                                   Preview ─────────────────────────────────────────────────────────────</tspan>
    <tspan x="16" dy="18">                                                   wallet: main                                                         </tspan>
    <tspan x="16" dy="18">                                                   pubkey: QWmroo4YnnMqYW3cnxWkFdaTxGD3P7vMSzwMHGbUzwF                  </tspan>
    <tspan x="16" dy="18">                                                   active for batch actions: yes                                        </tspan>
    <tspan x="16" dy="18">                                                   preview: total=3 cleanable=3 blocked=0                               </tspan>
    <tspan x="16" dy="18">                                                   toggles match 3 account(s), reclaim≈0.006118 SOL                     </tspan>
    <tspan x="16" dy="18">                                                                                                                        </tspan>
    <tspan x="16" dy="18">                                                   Matched Accounts                                                     </tspan>
    <tspan x="16" dy="18">                                                   unwrap_wsol  mint=So11...1112  bal=0.002000  reclaim=0.002039        </tspan>
    <tspan x="16" dy="18">                                                   burn_and_close  mint=cGfH...izuN  bal=125.000000  reclaim=0.002039   </tspan>
    <tspan x="16" dy="18">                                                   close_empty  mint=2d46...vzjy  bal=0.000000  reclaim=0.002039        </tspan>
    <tspan x="16" dy="18">                                                                                                                        </tspan>
    <tspan x="16" dy="18">                                                   loaded cleaner preview for 3 wallet(s)                               </tspan>
    <tspan x="16" dy="18">                                                                                                                        </tspan>
    <tspan x="16" dy="18">                                                   Last Run                                                             </tspan>
    <tspan x="16" dy="18">                                                   main (QWmr...UzwF) OK                                                </tspan>
    <tspan x="16" dy="18">────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────</tspan>
    <tspan x="16" dy="18">                        Esc menu • r refresh • Enter build/send cleaner batch for active wallets                        </tspan>
  </text>
